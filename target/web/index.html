<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  :root {
    --bg:        #0a0e0a;
    --bg-soft:   #0f140f;
    --panel:     #131913;
    --line:      #1f2a1f;
    --line-hot:  #2d4030;
    --fg:        #c5e8c5;
    --fg-dim:    #6f8a6f;
    --fg-muted:  #3f5440;
    --accent:    #7dff9c;
    --accent-2:  #4ade80;
    --warn:      #f0c674;
    --error:     #ff6b6b;
    --user:      #79c7ff;
    --shadow:    rgba(125, 255, 156, 0.12);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: Arial, Helvetica, sans-serif;
    font-size: 14px;
    overflow: hidden;
  }

  /* CRT-Scanline-Overlay, dezent */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0) 0px,
        rgba(0, 0, 0, 0) 2px,
        rgba(0, 0, 0, 0.18) 3px,
        rgba(0, 0, 0, 0) 4px
      );
    pointer-events: none;
    z-index: 100;
    opacity: 0.35;
  }

  /* Vignette / Glow */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 99;
  }

  .app {
    display: grid;
    grid-template-rows: auto 1fr auto;
    height: 100vh;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px;
    gap: 16px;
    position: relative;
    z-index: 1;
  }

  /* ===== Header ===== */
  header {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 1px solid var(--line);
    padding-bottom: 14px;
    gap: 24px;
  }

  .brand {
    display: flex;
    align-items: baseline;
    gap: 14px;
  }

  .brand .logo {
    font-family: 'Major Mono Display', monospace;
    font-size: 26px;
    color: var(--accent);
    letter-spacing: 0.04em;
    text-shadow: 0 0 12px var(--shadow);
  }

  .brand .tag {
    color: var(--fg-muted);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    border-left: 1px solid var(--line-hot);
    padding-left: 14px;
  }

  .meta {
    display: flex;
    align-items: center;
    gap: 18px;
    color: var(--fg-dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--fg-muted);
    box-shadow: 0 0 0 0 transparent;
    transition: background 0.3s, box-shadow 0.3s;
  }

  .dot.ready {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent), 0 0 14px var(--shadow);
    animation: pulse 2.4s ease-in-out infinite;
  }

  .dot.error { background: var(--error); box-shadow: 0 0 8px var(--error); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }

  /* ===== Terminal ===== */
  .terminal {
    background: var(--bg-soft);
    border: 1px solid var(--line);
    border-radius: 2px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    box-shadow:
      inset 0 0 60px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(125, 255, 156, 0.04);
    position: relative;
  }

  .terminal-bar {
    background: var(--panel);
    border-bottom: 1px solid var(--line);
    padding: 8px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 11px;
    color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
  }

  .terminal-bar .actions {
    display: flex;
    gap: 6px;
  }

  .btn {
    background: transparent;
    border: 1px solid var(--line-hot);
    color: var(--fg-dim);
    font-family: inherit;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    padding: 5px 10px;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  .btn:hover {
    color: var(--accent);
    border-color: var(--accent-2);
    background: rgba(125, 255, 156, 0.05);
  }

  .btn:active { transform: translateY(1px); }

  .output {
    flex: 1;
    padding: 18px 20px 8px;
    overflow-y: auto;
    line-height: 1.65;
    scroll-behavior: smooth;
  }

  .output::-webkit-scrollbar { width: 8px; }
  .output::-webkit-scrollbar-track { background: transparent; }
  .output::-webkit-scrollbar-thumb {
    background: var(--line-hot);
    border-radius: 0;
  }
  .output::-webkit-scrollbar-thumb:hover { background: var(--fg-muted); }

  .line { white-space: pre-wrap; word-break: break-word; }
  .line + .line { margin-top: 2px; }

  .line.user { color: var(--user); }
  .line.user::before {
    content: '› ';
    color: var(--accent);
    font-weight: 700;
  }

  .line.result { color: var(--fg); padding-left: 14px; }
  .line.error  { color: var(--error); padding-left: 14px; }
  .line.system { color: var(--fg-dim); font-style: italic; }
  .line.boot   { color: var(--accent-2); }

  .banner {
    color: var(--accent);
    white-space: pre;
    font-size: 12px;
    line-height: 1.2;
    text-shadow: 0 0 6px var(--shadow);
    margin-bottom: 6px;
  }

  /* ===== Input ===== */
  .input-row {
    display: flex;
    align-items: center;
    border-top: 1px solid var(--line);
    background: var(--panel);
    padding: 12px 18px;
  }

  .prompt {
    color: var(--accent);
    font-weight: 700;
    margin-right: 12px;
    user-select: none;
    text-shadow: 0 0 6px var(--shadow);
  }

  .input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--user);
    font-family: inherit;
    font-size: 14px;
    caret-color: var(--accent);
  }

  .input::placeholder { color: var(--fg-muted); font-style: italic; }

  /* ===== Footer ===== */
  footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--fg-muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    padding-top: 4px;
  }

  footer .keys span {
    color: var(--fg-dim);
    margin: 0 6px;
  }

  footer kbd {
    background: var(--panel);
    border: 1px solid var(--line-hot);
    padding: 2px 6px;
    font-size: 9px;
    color: var(--fg);
    border-radius: 2px;
    font-family: inherit;
  }

  /* Subtle entrance */
  .terminal { animation: rise 0.5s ease-out; }
  @keyframes rise {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 640px) {
    .app { padding: 14px; }
    .brand .logo { font-size: 20px; }
    .brand .tag { display: none; }
    .meta { font-size: 10px; gap: 10px; }
    footer .keys { display: none; }
  }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="brand">
      <div class="logo">simpleAlgebra</div>
      <div class="tag">linear // algebra // repl</div>
    </div>
    <div class="meta">
      <div class="status">
        <span class="dot" id="statusDot"></span>
        <span id="statusText">booting</span>
      </div>
      <div>teaVM/wasm</div>
    </div>
  </header>

  <section class="terminal">
    <div class="terminal-bar">
      <span>session://main</span>
      <div class="actions">
        <button class="btn" id="btnHelp"  title="Hilfe anzeigen">help</button>
        <button class="btn" id="btnClear" title="Bildschirm leeren">clear</button>
        <button class="btn" id="btnReset" title="Interpreter zuruecksetzen">reset</button>
      </div>
    </div>

    <div class="output" id="output" aria-live="polite"></div>

    <div class="input-row">
      <span class="prompt">›</span>
      <input
        type="text"
        class="input"
        id="input"
        placeholder="warte auf wasm-modul…"
        autocomplete="off"
        autocorrect="off"
        autocapitalize="off"
        spellcheck="false"
        disabled
      >
    </div>
  </section>

  <footer>
    <div>© simpleAlgebra · ein REPL fuer lineare algebra</div>
    <div class="keys">
      <kbd>↑</kbd><kbd>↓</kbd><span>history</span>
      <kbd>Enter</kbd><span>eval</span>
      <kbd>Ctrl+L</kbd><span>clear</span>
    </div>
  </footer>

</div>

<!--
  TeaVM-Output ist ein ES-Modul mit named exports:
    export { ... as main, ... as evaluate, ... as help, ... as reset }
  Wir importieren das Modul, rufen main() auf (TeaVM-Entry-Point) und
  legen die Bridge-Funktionen auf window, damit das UI-Script sie findet.
-->
<script type="module">
  import { main, evaluate, help, reset } from './classes.js';
  window.evaluate = evaluate;
  window.help     = help;
  window.reset    = reset;
  try {
    // main() ist in der Bridge-Klasse leer, aber TeaVM nutzt den Aufruf
    // zum Initialisieren der Runtime. Sicher ist sicher.
    if (typeof main === 'function') main();
  } catch (e) {
    console.error('TeaVM main() schlug fehl:', e);
  }
  // Signal an das UI-Script, dass die Bridge bereit ist
  window.dispatchEvent(new CustomEvent('teavm:ready'));
</script>

<script>
(function () {
  'use strict';

  const $output    = document.getElementById('output');
  const $input     = document.getElementById('input');
  const $statusDot = document.getElementById('statusDot');
  const $statusTxt = document.getElementById('statusText');
  const $btnHelp   = document.getElementById('btnHelp');
  const $btnClear  = document.getElementById('btnClear');
  const $btnReset  = document.getElementById('btnReset');

  const history = [];
  let histIdx = -1;
  let draft = '';

  // ---------- Output helpers ----------
  function write(text, cls) {
    if (text === undefined || text === null) return;
    const lines = String(text).split('\n');
    for (const l of lines) {
      const div = document.createElement('div');
      div.className = 'line ' + (cls || '');
      div.textContent = l.length ? l : '\u00A0';
      $output.appendChild(div);
    }
    $output.scrollTop = $output.scrollHeight;
  }

  function writeBanner() {
    const div = document.createElement('div');
    div.className = 'banner';
    div.textContent =
      "  ___ _            _    _   _         _\n" +
      " / __(_)_ __  _ __| |__/_\\ | |__ _ ___| |__ _ _ __ _\n" +
      " \\__ \\ | '  \\| '_ \\ / -_) _ \\| / _` / -_) '_ \\ '_/ _` |\n" +
      " |___/_|_|_|_| .__/_\\___/_/ \\_\\_\\__,_\\___|_.__/_| \\__,_|\n" +
      "             |_|\n";
    $output.appendChild(div);
  }

  // ---------- Boot ----------
  function setStatus(state, text) {
    $statusDot.className = 'dot ' + state;
    $statusTxt.textContent = text;
  }

  function ready() {
    setStatus('ready', 'ready');
    $input.disabled = false;
    $input.placeholder = 'gib einen ausdruck ein, z.B.  A = [[1,2],[3,4]]';
    $input.focus();
  }

  function bootError(err) {
    setStatus('error', 'failed');
    write('Fehler beim Laden des WASM-Moduls:', 'error');
    write(String(err && err.message || err), 'error');
    write('Stelle sicher, dass classes.js im selben Verzeichnis liegt.', 'system');
  }

  // TeaVM ruft beim Laden automatisch main() auf bzw. exposed
  // die @JSExport-Methoden ueber den Modul-Import oben.

  // ---------- Commands ----------
  function evalLine(raw) {
    const line = raw.trim();
    write(raw, 'user');
    if (!line) return;

    // History
    if (history[history.length - 1] !== line) history.push(line);
    histIdx = -1;
    draft = '';

    // UI-only Befehle, wie in der Bridge-Klasse beschrieben
    const lower = line.toLowerCase();
    if (lower === 'clear' || lower === 'cls') return doClear();
    if (lower === 'help' || lower === '?')   return doHelp();
    if (lower === 'reset')                    return doReset();
    if (lower === 'exit' || lower === 'quit') {
      write('(im browser kein exit – schliess einfach den tab.)', 'system');
      return;
    }

    // An TeaVM-Bridge weiterreichen
    let result;
    try {
      result = window.evaluate(line);
    } catch (e) {
      write('Error: ' + (e && e.message || e), 'error');
      return;
    }

    if (result === '' || result == null) return;
    if (typeof result === 'string' && result.startsWith('Error:')) {
      write(result, 'error');
    } else {
      write(result, 'result');
    }
  }

  function doHelp() {
    try {
      const txt = (typeof window.help === 'function')
        ? window.help()
        : 'Hilfe steht erst nach dem Laden des Moduls bereit.';
      write(txt, 'system');
    } catch (e) {
      write('Error: ' + e.message, 'error');
    }
  }

  function doClear() {
    $output.innerHTML = '';
  }

  function doReset() {
    // Bridge.reset() ist laut Kommentar im Java leer – pragmatisch reload.
    write('reset: lade seite neu …', 'system');
    setTimeout(() => window.location.reload(), 300);
  }

  // ---------- Input handling ----------
  $input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const v = $input.value;
      $input.value = '';
      evalLine(v);
      e.preventDefault();
      return;
    }

    if (e.key === 'ArrowUp') {
      if (history.length === 0) return;
      if (histIdx === -1) {
        draft = $input.value;
        histIdx = history.length - 1;
      } else if (histIdx > 0) {
        histIdx--;
      }
      $input.value = history[histIdx];
      // caret ans ende
      requestAnimationFrame(() => $input.setSelectionRange($input.value.length, $input.value.length));
      e.preventDefault();
      return;
    }

    if (e.key === 'ArrowDown') {
      if (histIdx === -1) return;
      if (histIdx < history.length - 1) {
        histIdx++;
        $input.value = history[histIdx];
      } else {
        histIdx = -1;
        $input.value = draft;
      }
      requestAnimationFrame(() => $input.setSelectionRange($input.value.length, $input.value.length));
      e.preventDefault();
      return;
    }

    // Ctrl+L: clear (wie in echten Shells)
    if (e.ctrlKey && (e.key === 'l' || e.key === 'L')) {
      doClear();
      e.preventDefault();
      return;
    }
  });

  // Klick irgendwo im Terminal -> Input fokussieren
  document.querySelector('.terminal').addEventListener('click', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    if (window.getSelection().toString()) return; // Auswahl nicht stoeren
    $input.focus();
  });

  $btnHelp .addEventListener('click', () => { doHelp();  $input.focus(); });
  $btnClear.addEventListener('click', () => { doClear(); $input.focus(); });
  $btnReset.addEventListener('click', () => { doReset(); });

  // ---------- Start ----------
  setStatus('', 'loading wasm…');

  function boot() {
    if (typeof window.evaluate === 'function') {
      writeBanner();
      write('SimpleAlgebra REPL  ·  WASM bridge online', 'boot');
      write('tippe  help  fuer eine uebersicht der befehle.', 'system');
      write('', '');
      ready();
    } else {
      bootError(new Error('window.evaluate wurde nicht exportiert.'));
    }
  }

  // Das Modul-Script feuert teavm:ready, sobald die Imports stehen.
  // Falls das Event schon vor unserem Listener gefeuert hat (sehr selten,
  // aber moeglich bei gecachten Modulen), pruefen wir nach DOMContentLoaded.
  let booted = false;
  window.addEventListener('teavm:ready', () => {
    if (booted) return;
    booted = true;
    boot();
  });

  // Fallback fuer den Fall, dass das Event-Timing schiefgeht oder das
  // Modul-Script gar nicht laedt (404 auf classes.js etc.)
  setTimeout(() => {
    if (booted) return;
    booted = true;
    boot();
  }, 3000);
})();
</script>

</body>
</html>
